<!-- # DÍA 2 — “Calculadora de compra”

## Conceptos

Operaciones + tipos numéricos + estructura de salida clara.

## Enunciado

Crea un programa que simule una compra sencilla.

El programa debe:

Pedir:

- Nombre del producto
- Precio unitario
- Cantidad

Calcular:

- Precio total
- IVA (21%)
- Total final con IVA

Mostrar un “ticket” por pantalla:


<pre><code class="language-text">------ TICKET ------
Producto: Camiseta
Cantidad: 2
Precio unitario: 10€
Subtotal: 20€
IVA (21%): 4.2€
TOTAL: 24.2€
-------------------
</code></pre>


## Requisitos adicionales

- Los números deben tratarse como números (no concatenar texto)
- El cálculo debe ser correcto
- Orden claro en la salida

## Ampliación

Añadir una línea final:

- Mostrar el total con 2 decimales
- Añadir un mensaje final:
  - “Compra pequeña” si < 20€
  - “Compra grande” si ≥ 20€ -->
